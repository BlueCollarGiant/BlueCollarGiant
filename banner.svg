<svg xmlns="http://www.w3.org/2000/svg" width="900" height="200" viewBox="0 0 900 200">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');

      .bg { fill: #0d0d1a; }
      .grid-line { stroke: #1a2a3a; stroke-width: 0.5; }
      .title {
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 36px;
        font-weight: bold;
        fill: #00e5ff;
        filter: url(#glow);
      }
      .subtitle {
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 14px;
        fill: #8899aa;
        letter-spacing: 3px;
      }
      .tag {
        font-family: 'Share Tech Mono', 'Courier New', monospace;
        font-size: 11px;
        fill: #00e5ff;
        opacity: 0.6;
      }
      .bracket { fill: none; stroke: #00e5ff; stroke-width: 1.5; opacity: 0.4; }
      .cursor {
        fill: #00e5ff;
        animation: blink 1.1s step-end infinite;
      }
      .scanline {
        fill: none;
        stroke: #00e5ff;
        stroke-width: 1;
        opacity: 0;
        animation: scan 4s linear infinite;
      }
      .hex { fill: none; stroke: #1e3a4a; stroke-width: 1; opacity: 0.5; }
      .corner-accent { fill: none; stroke: #00e5ff; stroke-width: 2; opacity: 0.7; }

      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      @keyframes scan {
        0%   { opacity: 0; transform: translateY(-10px); }
        10%  { opacity: 0.15; }
        90%  { opacity: 0.15; }
        100% { opacity: 0; transform: translateY(210px); }
      }
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .title-anim {
        animation: fadeInUp 0.8s ease-out 0.2s both;
      }
      .sub-anim {
        animation: fadeInUp 0.8s ease-out 0.6s both;
      }
      .tag-anim {
        animation: fadeInUp 0.8s ease-out 1.0s both;
      }
    </style>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="subtle-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" class="bg" rx="6"/>

  <!-- Blueprint grid -->
  <g>
    <!-- Vertical lines -->
    <line x1="50"  y1="0" x2="50"  y2="200" class="grid-line"/>
    <line x1="100" y1="0" x2="100" y2="200" class="grid-line"/>
    <line x1="150" y1="0" x2="150" y2="200" class="grid-line"/>
    <line x1="200" y1="0" x2="200" y2="200" class="grid-line"/>
    <line x1="250" y1="0" x2="250" y2="200" class="grid-line"/>
    <line x1="300" y1="0" x2="300" y2="200" class="grid-line"/>
    <line x1="350" y1="0" x2="350" y2="200" class="grid-line"/>
    <line x1="400" y1="0" x2="400" y2="200" class="grid-line"/>
    <line x1="450" y1="0" x2="450" y2="200" class="grid-line"/>
    <line x1="500" y1="0" x2="500" y2="200" class="grid-line"/>
    <line x1="550" y1="0" x2="550" y2="200" class="grid-line"/>
    <line x1="600" y1="0" x2="600" y2="200" class="grid-line"/>
    <line x1="650" y1="0" x2="650" y2="200" class="grid-line"/>
    <line x1="700" y1="0" x2="700" y2="200" class="grid-line"/>
    <line x1="750" y1="0" x2="750" y2="200" class="grid-line"/>
    <line x1="800" y1="0" x2="800" y2="200" class="grid-line"/>
    <line x1="850" y1="0" x2="850" y2="200" class="grid-line"/>
    <!-- Horizontal lines -->
    <line x1="0" y1="40"  x2="900" y2="40"  class="grid-line"/>
    <line x1="0" y1="80"  x2="900" y2="80"  class="grid-line"/>
    <line x1="0" y1="120" x2="900" y2="120" class="grid-line"/>
    <line x1="0" y1="160" x2="900" y2="160" class="grid-line"/>
  </g>

  <!-- Corner accents top-left -->
  <polyline points="20,40 20,16 44,16" class="corner-accent"/>
  <!-- Corner accents top-right -->
  <polyline points="880,40 880,16 856,16" class="corner-accent"/>
  <!-- Corner accents bottom-left -->
  <polyline points="20,160 20,184 44,184" class="corner-accent"/>
  <!-- Corner accents bottom-right -->
  <polyline points="880,160 880,184 856,184" class="corner-accent"/>

  <!-- Left bracket decoration -->
  <text x="28" y="115" class="tag" opacity="0.4" font-size="60" fill="none" stroke="#00e5ff" stroke-width="1">{</text>
  <!-- Right bracket decoration -->
  <text x="854" y="115" class="tag" opacity="0.4" font-size="60" fill="none" stroke="#00e5ff" stroke-width="1">}</text>

  <!-- Scanline sweep -->
  <line x1="0" y1="0" x2="900" y2="0" class="scanline"/>

  <!-- Main text group — centered -->
  <g text-anchor="middle">
    <!-- Top tag line -->
    <text x="450" y="70" class="tag tag-anim" filter="url(#subtle-glow)">// MACHINIST TURNED FULL-STACK DEVELOPER</text>

    <!-- Main title -->
    <text x="450" y="122" class="title title-anim">Isaiah — BlueCollarGiant</text>

    <!-- Blinking cursor after title -->
    <rect x="690" y="100" width="3" height="26" class="cursor"/>

    <!-- Subtitle -->
    <text x="450" y="152" class="subtitle sub-anim">ANGULAR · TYPESCRIPT · NODE · MONGODB · FIREBASE</text>
  </g>

  <!-- Bottom left label -->
  <text x="30" y="192" class="tag" opacity="0.5">v2.0.0</text>
  <!-- Bottom right label -->
  <text x="870" y="192" class="tag" text-anchor="end" opacity="0.5">THE HOUSE OF CRIMSON LLC · FULL-STACK · DEPLOYED</text>
</svg>
